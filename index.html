      { chinese: "杯弓蛇影", pinyin: "bēi gōng shé yǐng", english: "Mistaking the Reflection of a Bow for a Snake (idiom)", descZh: "因疑神疑鬼而产生不必要的恐惧。", descEn: "Irrational fear caused by misperception and paranoia.", category: "情绪与动机" },
      { chinese: "一朝被蛇咬，十年怕井绳", pinyin: "yī zhāo bèi shé yǎo, shí nián pà jǐng shéng", english: "Once Bitten, Twice Shy (idiom)", descZh: "经历创伤后对类似刺激产生长期恐惧。", descEn: "A bad experience induces lasting fear of similar situations; conditioned fear.", category: "情绪与动机" },
      { chinese: "知足常乐", pinyin: "zhī zú cháng lè", english: "Contentment Brings Happiness (idiom)", descZh: "满足于现有生活能带来持久的幸福感。", descEn: "Being content with what one has leads to lasting happiness; hedonic adaptation.", category: "情绪与动机" },
      { chinese: "乐极生悲", pinyin: "lè jí shēng bēi", english: "Extreme Joy Begets Sorrow (idiom)", descZh: "过度快乐可能转化为悲伤，体现情绪对比。", descEn: "Excessive joy can turn into sorrow; emotional contrast effect.", category: "情绪与动机" },
      { chinese: "急中生智", pinyin: "jí zhōng shēng zhì", english: "Quick-witted in an Emergency (idiom)", descZh: "在危急时刻想出解决办法，体现最佳唤醒水平。", descEn: "Resourcefulness under pressure; related to Yerkes-Dodson optimal arousal.", category: "情绪与动机" },
      { chinese: "心乱如麻", pinyin: "xīn luàn rú má", english: "Heart Tangled Like Hemp (idiom)", descZh: "思绪极度混乱，难以理清。", descEn: "Extreme mental confusion and emotional turmoil.", category: "情绪与动机" },
      { chinese: "喜新厌旧", pinyin: "xǐ xīn yàn jiù", english: "Like the New and Loathe the Old (idiom)", descZh: "对新奇事物的偏好和对熟悉事物的厌倦。", descEn: "Preference for novelty and boredom with the familiar; novelty seeking.", category: "情绪与动机" },
      { chinese: "患得患失", pinyin: "huàn dé huàn shī", english: "Worry About Gains and Losses (idiom)", descZh: "过分计较得失，反映损失厌恶心理。", descEn: "Excessive concern over potential gains and losses; mirrors loss aversion.", category: "情绪与动机" },
      { chinese: "望梅止渴", pinyin: "wàng méi zhǐ kě", english: "Quench Thirst by Thinking of Plums (idiom)", descZh: "通过想象来缓解实际需求，类似安慰剂效应。", descEn: "Using imagination to satisfy a real need; akin to placebo effect.", category: "情绪与动机" },
      { chinese: "心猿意马", pinyin: "xīn yuán yì mǎ", english: "Heart Like a Monkey, Mind Like a Horse (idiom)", descZh: "心思散乱，注意力难以集中。", descEn: "Restless and distractible mind.", category: "情绪与动机" },
      // 以下为新增爱情相关术语
      { chinese: "吊桥效应", pinyin: "diào qiáo xiào yìng", english: "Misattribution of Arousal", descZh: "将生理唤醒（如心跳加快）错误归因于对方吸引力的现象。", descEn: "Misinterpreting physiological arousal (e.g., a racing heart) as romantic attraction.", category: "情绪与动机" },
      { chinese: "马赫带现象", pinyin: "mǎ hè dài xiàn xiàng", english: "Mach Band Illusion (Love's Contrast Effect)", descZh: "爱情中对伴侣的评价会受到先前接触对象的影响，形成对比。", descEn: "Evaluations of a romantic partner are influenced by comparisons with previously observed individuals.", category: "情绪与动机" },
      { chinese: "卒取效应", pinyin: "zú qǔ xiào yìng", english: "Zip Code Effect / Propinquity Effect", descZh: "地理上的邻近会增加人们相互吸引和建立关系的可能性。", descEn: "Geographical proximity increases the likelihood of attraction and relationship formation.", category: "情绪与动机" },
      { chinese: "依恋理论", pinyin: "yī liàn lǐ lùn", english: "Attachment Theory", descZh: "早期照顾者关系形成的内在运作模式，影响成年后的亲密关系（安全型、焦虑型、回避型）。", descEn: "A framework explaining how early childhood relationships shape adult attachment styles (secure, anxious, avoidant).", category: "情绪与动机" },
      { chinese: "激情之爱", pinyin: "jī qíng zhī ài", english: "Passionate Love", descZh: "以强烈的情感唤起、性吸引和占有欲为特征的爱。", descEn: "An intense emotional state characterized by arousal, attraction, and longing for union.", category: "情绪与动机" },
      { chinese: "伴侣之爱", pinyin: "bàn lǚ zhī ài", english: "Companionate Love", descZh: "建立在深厚友谊、信任和共同承诺上的稳定情感。", descEn: "Deep affectionate attachment based on friendship, trust, and commitment.", category: "情绪与动机" },
      { chinese: "爱情三元理论", pinyin: "ài qíng sān yuán lǐ lùn", english: "Triangular Theory of Love", descZh: "斯滕伯格提出，爱情由亲密、激情和承诺三要素组成。", descEn: "Sternberg's theory that love consists of intimacy, passion, and commitment.", category: "情绪与动机" },
      { chinese: "相似吸引原则", pinyin: "xiāng sì xī yǐn yuán zé", english: "Similarity-Attraction Principle", descZh: "人们更容易被与自己在态度、价值观、背景上相似的人吸引。", descEn: "The tendency to be attracted to others who share similar attitudes, values, or backgrounds.", category: "情绪与动机" },
      { chinese: "对等吸引原则", pinyin: "duì děng xī yǐn yuán zé", english: "Reciprocity of Liking", descZh: "当我们知道对方喜欢自己时，我们也更容易喜欢对方。", descEn: "The tendency to feel attracted to people who we believe like us.", category: "情绪与动机" },
      { chinese: "恋爱补偿效应", pinyin: "liàn ài bǔ cháng xiào yìng", english: "Mate Value Matching", descZh: "人们倾向于选择与自己“婚配价值”相当的伴侣。", descEn: "The tendency to pair up with partners who have a similar level of desirability.", category: "情绪与动机" },
      { chinese: "得不到的永远在骚动", pinyin: "dé bù dào de yǒng yuǎn zài sāo dòng", english: "The Unattainable is Always Desirable (idiom)", descZh: "形容对难以得到的人或物念念不忘。", descEn: "Persistent desire for someone or something unattainable; related to the scarcity effect.", category: "情绪与动机" },
      { chinese: "情人眼里出西施", pinyin: "qíng rén yǎn lǐ chū xī shī", english: "Beauty Lies in the Lover's Eyes (idiom)", descZh: "因为喜爱而觉得对方完美无瑕，体现积极的知觉偏差。", descEn: "Love makes one see the beloved as flawless; a positive perceptual bias.", category: "情绪与动机" },
      { chinese: "朝思暮想", pinyin: "zhāo sī mù xiǎng", english: "Yearn for Someone Day and Night (idiom)", descZh: "形容对心爱的人日夜思念。", descEn: "Missing a loved one intensely, thinking about them constantly.", category: "情绪与动机" },
      { chinese: "心有所属", pinyin: "xīn yǒu suǒ shǔ", english: "One's Heart Already Belongs to Someone (idiom)", descZh: "内心已经对某人有了归属感，不再关注他人。", descEn: "Having given one's heart to a specific person, and no longer interested in others.", category: "情绪与动机" },
      { chinese: "两情相悦", pinyin: "liǎng qíng xiāng yuè", english: "Mutual Affection (idiom)", descZh: "双方互相爱慕，情投意合。", descEn: "Both parties have romantic feelings for each other.", category: "情绪与动机" },

      // 人际关系 (12 terms)
      { chinese: "将心比心", pinyin: "jiāng xīn bǐ xīn", english: "Put Oneself in Another's Shoes (idiom)", descZh: "设身处地为他人着想，促进共情和公平。", descEn: "To empathize by considering another's perspective, fostering fairness.", category: "人际关系" },
      { chinese: "己所不欲，勿施于人", pinyin: "jǐ suǒ bù yù, wù shī yú rén", english: "Do Not Do to Others What You Don't Want Done to Yourself (idiom)", descZh: "黄金法则：避免对他人做自己不愿意接受的事。", descEn: "The Golden Rule: avoid treating others in ways you would not like to be treated.", category: "人际关系" },
      { chinese: "一见钟情", pinyin: "yī jiàn zhōng qíng", english: "Love at First Sight (idiom)", descZh: "初次见面就产生强烈好感，可能与光环效应有关。", descEn: "Instant romantic attraction upon first meeting, often linked to the halo effect.", category: "人际关系" },
      { chinese: "日久生情", pinyin: "rì jiǔ shēng qíng", english: "Love Develops Over Time (idiom)", descZh: "长期相处逐渐产生感情，即纯粹曝光效应。", descEn: "Feelings grow through prolonged exposure; mere-exposure effect in relationships.", category: "人际关系" },
      { chinese: "富兰克林效应", pinyin: "fù lán kè lín xiào yìng", english: "Ben Franklin Effect", descZh: "帮助过某人后，反而会对该人产生好感。", descEn: "A person who has done a favor for someone is more likely to do another favor for that person and like them more.", category: "人际关系" },
      { chinese: "罗密欧与朱丽叶效应", pinyin: "luó mì ōu yǔ zhū lì yè xiào yìng", english: "Romeo and Juliet Effect", descZh: "父母干涉反而使恋爱关系更牢固。", descEn: "Parental opposition intensifies romantic feelings.", category: "人际关系" },
      { chinese: "出丑效应", pinyin: "chū chǒu xiào yìng", english: "Pratfall Effect", descZh: "完美的人偶尔犯错更具吸引力。", descEn: "A competent person becomes more likable after making a small blunder.", category: "人际关系" },
      { chinese: "以小人之心，度君子之腹", pinyin: "yǐ xiǎo rén zhī xīn, duó jūn zǐ zhī fù", english: "Measure a Gentleman's Mind with a Villain's Measure (idiom)", descZh: "把自己的不良动机投射到别人身上。", descEn: "Projecting one's own petty motives onto others.", category: "人际关系" },
      { chinese: "物以类聚，人以群分", pinyin: "wù yǐ lèi jù, rén yǐ qún fēn", english: "Birds of a Feather Flock Together (idiom)", descZh: "相似的人容易聚集，即同质性。", descEn: "People tend to associate with similar others; homophily.", category: "人际关系" },
      { chinese: "近朱者赤，近墨者黑", pinyin: "jìn zhū zhě chì, jìn mò zhě hēi", english: "One Takes on the Color of One's Company (idiom)", descZh: "环境对人有潜移默化的影响。", descEn: "A person's character is influenced by their social environment.", category: "人际关系" },
      { chinese: "心有灵犀", pinyin: "xīn yǒu líng xī", english: "Hearts Have a Secret Link (idiom)", descZh: "两人心意相通，无需言语也能理解。", descEn: "A deep empathic connection where two people understand each other without words.", category: "人际关系" },
      { chinese: "当局者迷，旁观者清", pinyin: "dāng jú zhě mí, páng guān zhě qīng", english: "The Player is Lost, the Bystander Sees Clearly (idiom)", descZh: "当事人易迷茫，局外人更客观。", descEn: "Those involved are often confused, while outsiders see the situation objectively.", category: "人际关系" },

      // 自我与归因 (10 terms)
      { chinese: "自利偏误", pinyin: "zì lì piān wù", english: "Self-serving Bias", descZh: "将成功归因于自己，失败归因于外部因素。", descEn: "Attributing successes to personal factors and failures to external factors.", category: "自我与归因" },
      { chinese: "基本归因错误", pinyin: "jī běn guī yīn cuò wù", english: "Fundamental Attribution Error", descZh: "低估情境因素，高估个人特质对他人行为的影响。", descEn: "Overemphasizing personality and underestimating situational factors when explaining others' behavior.", category: "自我与归因" },
      { chinese: "行动者-观察者偏差", pinyin: "xíng dòng zhě-guān chá zhě piān chā", english: "Actor-Observer Bias", descZh: "作为行动者时归因于情境，作为观察者时归因于特质。", descEn: "Attributing one's own actions to situations but others' actions to their dispositions.", category: "自我与归因" },
      { chinese: "邓宁-克鲁格效应", pinyin: "dèng níng-kè lǔ gé xiào yìng", english: "Dunning-Kruger Effect", descZh: "能力低的人高估自己，能力高的人低估自己。", descEn: "Unskilled individuals overestimate their ability, while experts underestimate theirs.", category: "自我与归因" },
      { chinese: "过度理由效应", pinyin: "guò dù lǐ yóu xiào yìng", english: "Overjustification Effect", descZh: "外部奖励降低内在动机。", descEn: "External rewards can reduce intrinsic motivation.", category: "自我与归因" },
      { chinese: "自我服务偏差", pinyin: "zì wǒ fú wù piān chā", english: "Self-serving Bias", descZh: "维持积极自我形象的信息加工倾向。", descEn: "Processing information in a way that enhances one's self-image.", category: "自我与归因" },
      { chinese: "认知失调", pinyin: "rèn zhī shī tiáo", english: "Cognitive Dissonance", descZh: "当行为与信念冲突时产生不适，并试图合理化。", descEn: "Mental discomfort from holding contradictory beliefs or behaviors, leading to rationalization.", category: "自我与归因" },
      { chinese: "掩耳盗铃", pinyin: "yǎn ěr dào líng", english: "Plug One's Ears While Stealing a Bell (idiom)", descZh: "自欺欺人，以为看不到问题就不存在。", descEn: "Self-deception; ignoring obvious problems to avoid discomfort.", category: "自我与归因" },
      { chinese: "自欺欺人", pinyin: "zì qī qī rén", english: "Deceive Oneself and Others (idiom)", descZh: "用谎言安慰自己和他人。", descEn: "Trying to believe one's own lies while fooling others.", category: "自我与归因" },
      { chinese: "画蛇添足", pinyin: "huà shé tiān zú", english: "Adding Legs to a Snake (idiom)", descZh: "做多余的事情反而坏事。", descEn: "Overdoing something ruins it; unnecessary elaboration.", category: "自我与归因" },

      // 决策与判断 (10 terms)
      { chinese: "诱饵效应", pinyin: "yòu ěr xiào yìng", english: "Decoy Effect", descZh: "引入一个不对称选项使另一个选项更有吸引力。", descEn: "An asymmetrically dominated option makes another option seem more attractive.", category: "决策与判断" },
      { chinese: "选择超载", pinyin: "xuǎn zé chāo zài", english: "Choice Overload", descZh: "选项太多导致决策困难和不满意。", descEn: "Having too many options leads to decision paralysis and decreased satisfaction.", category: "决策与判断" },
      { chinese: "禀赋效应", pinyin: "bǐng fù xiào yìng", english: "Endowment Effect", descZh: "拥有某物后，对其估价高于拥有前。", descEn: "Valuing something more once you own it.", category: "决策与判断" },
      { chinese: "现状偏差", pinyin: "xiàn zhuàng piān chā", english: "Status Quo Bias", descZh: "倾向于保持现状，不愿改变。", descEn: "Preference for the current state of affairs and resistance to change.", category: "决策与判断" },
      { chinese: "稀缺效应", pinyin: "xī quē xiào yìng", english: "Scarcity Effect", descZh: "稀缺的信息或物品被认为更有价值。", descEn: "Items perceived as scarce are considered more valuable.", category: "决策与判断" },
      { chinese: "心理账户", pinyin: "xīn lǐ zhàng hù", english: "Mental Accounting", descZh: "将钱划分到不同心理账户，影响消费决策。", descEn: "Treating money differently depending on its source or intended use.", category: "决策与判断" },
      { chinese: "破釜沉舟", pinyin: "pò fǔ chén zhōu", english: "Burn Boats (idiom)", descZh: "切断退路以强化承诺，类似承诺升级。", descEn: "Cutting off escape routes to force commitment; escalation of commitment.", category: "决策与判断" },
      { chinese: "画饼充饥", pinyin: "huà bǐng chōng jī", english: "Draw a Cake to Satisfy Hunger (idiom)", descZh: "用空想安慰自己，但无实际帮助。", descEn: "Comforting oneself with illusions that don't solve real problems.", category: "决策与判断" },
      { chinese: "熟能生巧", pinyin: "shú néng shēng qiǎo", english: "Practice Makes Perfect (idiom)", descZh: "反复练习能提高技能和效率。", descEn: "Proficiency comes through repeated practice.", category: "决策与判断" },
      { chinese: "马太效应", pinyin: "mǎ tài xiào yìng", english: "Matthew Effect", descZh: "强者愈强，弱者愈弱。", descEn: "The rich get richer and the poor get poorer.", category: "决策与判断" },

      // 心理健康 (6 terms)
      { chinese: "创伤后成长", pinyin: "chuāng shāng hòu chéng zhǎng", english: "Post-traumatic Growth", descZh: "经历创伤后出现积极心理变化。", descEn: "Positive psychological change experienced as a result of struggling with trauma.", category: "心理健康" },
      { chinese: "心理弹性", pinyin: "xīn lǐ tán xìng", english: "Psychological Resilience", descZh: "面对逆境、创伤或压力时的适应和恢复能力。", descEn: "The ability to adapt and bounce back from adversity, trauma, or stress.", category: "心理健康" },
      { chinese: "蔡格尼克效应", pinyin: "cài gé ní kè xiào yìng", english: "Zeigarnik Effect", descZh: "未完成的任务比已完成的任务更令人惦记。", descEn: "Unfinished tasks are remembered better than completed ones.", category: "心理健康" },
      { chinese: "杞人忧天", pinyin: "qǐ rén yōu tiān", english: "The Man of Qi Who Feared the Sky Would Fall (idiom)", descZh: "毫无根据的过度忧虑。", descEn: "Groundless anxiety and worry.", category: "心理健康" },
      { chinese: "塞翁失马", pinyin: "sài wēng shī mǎ", english: "The Old Man Lost His Horse (idiom)", descZh: "坏事可能变成好事，体现认知重构。", descEn: "A blessing in disguise; illustrates cognitive reframing.", category: "心理健康" },
      { chinese: "眼不见为净", pinyin: "yǎn bù jiàn wéi jìng", english: "Out of Sight, Out of Mind (idiom)", descZh: "回避问题以获得暂时平静。", descEn: "Avoiding a problem to reduce immediate anxiety; denial.", category: "心理健康" },

      // 发展与教育 (8 terms)
      { chinese: "罗森塔尔效应", pinyin: "luó sēn tǎ ěr xiào yìng", english: "Rosenthal Effect / Pygmalion Effect", descZh: "教师对学生的积极期望能提高学生表现。", descEn: "Higher expectations lead to an increase in performance.", category: "发展与教育" },
      { chinese: "戈莱姆效应", pinyin: "gē lái mǔ xiào yìng", english: "Golem Effect", descZh: "低期望导致表现下降。", descEn: "Low expectations cause a decrease in performance.", category: "发展与教育" },
      { chinese: "最近发展区", pinyin: "zuì jìn fā zhǎn qū", english: "Zone of Proximal Development (ZPD)", descZh: "在指导下能够完成但独立无法完成的任务范围。", descEn: "The difference between what a learner can do without help and with help.", category: "发展与教育" },
      { chinese: "延迟满足", pinyin: "yán chí mǎn zú", english: "Delayed Gratification", descZh: "为更长远的目标而抵制即时诱惑的能力。", descEn: "The ability to resist immediate rewards for more valuable future outcomes.", category: "发展与教育" },
      { chinese: "江山易改，本性难移", pinyin: "jiāng shān yì gǎi, běn xìng nán yí", english: "Rivers and Mountains Change, But One's Nature Hardly Shifts (idiom)", descZh: "人格特质的稳定性。", descEn: "Personality traits are highly stable over time.", category: "发展与教育" },
      { chinese: "积习难改", pinyin: "jī xí nán gǎi", english: "Old Habits Die Hard (idiom)", descZh: "长期养成的习惯难以改变。", descEn: "Long-standing habits are difficult to break.", category: "发展与教育" },
      { chinese: "心有余而力不足", pinyin: "xīn yǒu yú ér lì bù zú", english: "The Spirit is Willing but the Flesh is Weak (idiom)", descZh: "意愿强烈但能力或精力不足。", descEn: "Desire exceeds actual ability or energy.", category: "发展与教育" },
      { chinese: "一朝一夕", pinyin: "yī zhāo yī xī", english: "One Morning and One Evening (idiom)", descZh: "短时间内无法完成，需长期积累。", descEn: "Change cannot happen overnight; requires long-term effort.", category: "发展与教育" },

      // 数字时代心理 (4 terms)
      { chinese: "信息茧房", pinyin: "xìn xī jiǎn fáng", english: "Information Cocoons", descZh: "个体倾向于关注自己感兴趣的信息，久而久之将自己禁锢在像蚕茧一样的“茧房”中。", descEn: "A phenomenon where individuals, by focusing on information that interests them, become trapped in a 'cocoon' of like-minded ideas.", category: "数字时代心理" },
      { chinese: "回音室效应", pinyin: "huí yīn shì xiào yìng", english: "Echo Chamber Effect", descZh: "在封闭空间中，相近的观点被不断重复和加强。", descEn: "A situation where beliefs are amplified or reinforced by communication and repetition inside a closed system.", category: "数字时代心理" },
      { chinese: "过滤气泡", pinyin: "guò lǜ qì pào", english: "Filter Bubble", descZh: "算法根据用户偏好推送信息，使其处于文化、意识形态的“气泡”中。", descEn: "The intellectual isolation that can result from algorithms that personalize an individual's online experience.", category: "数字时代心理" },
      { chinese: "错失恐惧症", pinyin: "cuò shī kǒng jù zhèng", english: "FOMO (Fear Of Missing Out)", descZh: "害怕错过社交媒体上他人的精彩生活，从而产生焦虑。", descEn: "Anxiety that an exciting or interesting event may currently be happening elsewhere, often aroused by posts seen on social media.", category: "数字时代心理" }
    ];

    const container = document.getElementById('termsContainer');
    const searchInput = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearSearchBtn');
    const categoryButtons = document.querySelectorAll('.category-btn');
    const categoryDescDiv = document.getElementById('categoryDescription');

    let activeCategory = 'all';
    let searchTerm = '';

    function updateCategoryDescription() {
      const desc = categoryDescriptions[activeCategory] || categoryDescriptions.all;
      categoryDescDiv.innerHTML = `<span class="desc-chinese">${desc.zh}</span> <span class="desc-english">${desc.en}</span>`;
    }

    function renderTerms() {
      const filtered = psychologyTerms.filter(term => {
        if (activeCategory !== 'all' && term.category !== activeCategory) return false;
        if (searchTerm.trim() !== '') {
          const s = searchTerm.trim().toLowerCase();
          return (
            term.chinese.includes(searchTerm.trim()) ||
            term.pinyin.toLowerCase().includes(s) ||
            term.english.toLowerCase().includes(s) ||
            term.descZh.includes(searchTerm.trim()) ||
            term.descEn.toLowerCase().includes(s)
          );
        }
        return true;
      });

      if (filtered.length === 0) {
        container.innerHTML = `<div class="no-results">🧠 没有找到匹配的条目，试试其他关键词。No matching entries found.</div>`;
        return;
      }

      let html = '';
      filtered.forEach(term => {
        html += `
          <div class="term-card">
            <div class="term-header">
              <div class="chinese-block">
                <span class="chinese-term">${term.chinese}</span>
                <span class="pinyin-text">${term.pinyin}</span>
              </div>
              <span class="english-term">${term.english}</span>
              <span class="category-badge">${term.category}</span>
            </div>
            <div class="descriptions">
              <div class="desc-zh">📖 ${term.descZh}</div>
              <div class="desc-en">${term.descEn}</div>
            </div>
          </div>
        `;
      });
      container.innerHTML = html;
    }

    function updateCategoryButtons() {
      categoryButtons.forEach(btn => {
        btn.classList.toggle('active', btn.getAttribute('data-category') === activeCategory);
      });
    }

    categoryButtons.forEach(btn => {
      btn.addEventListener('click', function() {
        const cat = this.getAttribute('data-category');
        if (activeCategory === cat) return;
        activeCategory = cat;
        updateCategoryButtons();
        updateCategoryDescription();
        renderTerms();
      });
    });

    searchInput.addEventListener('input', function(e) {
      searchTerm = e.target.value;
      renderTerms();
    });

    clearBtn.addEventListener('click', function() {
      searchInput.value = '';
      searchTerm = '';
      renderTerms();
      searchInput.focus();
    });

    updateCategoryDescription();
    renderTerms();
  })();
</script>
</body>
</html>
