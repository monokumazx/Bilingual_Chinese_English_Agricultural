      { chinese: "豆科植物", pinyin: "dòu kē zhí wù", english: "Legume", descZh: "具有固氮能力的植物科，如大豆、豌豆、苜蓿。", descEn: "Plants of the family Fabaceae, many of which fix atmospheric nitrogen.", category: "作物" },

      { chinese: "转基因生物", pinyin: "zhuǎn jī yīn shēng wù", english: "GMO", descZh: "通过基因工程技术改变遗传物质的生物。", descEn: "Organism whose genetic material has been altered using genetic engineering.", category: "作物" },
      { chinese: "杂交种", pinyin: "zá jiāo zhǒng", english: "Hybrid Seed", descZh: "由两个遗传不同的亲本杂交产生的第一代种子。", descEn: "First‑generation seed from crossing two genetically distinct parents.", category: "作物" },

      { chinese: "光合作用", pinyin: "guāng hé zuò yòng", english: "Photosynthesis", descZh: "植物利用光能将二氧化碳和水转化为有机物并释放氧气。", descEn: "Process by which plants convert light energy into chemical energy, producing oxygen.", category: "作物" },
      { chinese: "蒸腾作用", pinyin: "zhēng téng zuò yòng", english: "Transpiration", descZh: "水分从植物叶片以水蒸气形式散失的过程。", descEn: "The loss of water vapor from plant leaves.", category: "作物" },
      { chinese: "农学", pinyin: "nóng xué", english: "Agronomy", descZh: "研究土壤管理和作物生产的科学。", descEn: "The science of soil management and crop production.", category: "作物" },
      { chinese: "伴生种植", pinyin: "bàn shēng zhòng zhí", english: "Companion Planting", descZh: "将相互有益的植物种植在一起，以促进生长或防治害虫。", descEn: "Planting different crops in proximity for mutual benefit such as pest control or enhanced growth.", category: "作物" },
      { chinese: "需冷量", pinyin: "xū lěng liàng", english: "Chill Hours", descZh: "某些果树冬季需要经历低温时数才能正常开花结果。", descEn: "The number of hours below a certain temperature required by fruit trees to break dormancy.", category: "作物" },
      { chinese: "氮利用效率", pinyin: "dàn lì yòng xiào lǜ", english: "Nitrogen Use Efficiency (NUE)", descZh: "作物吸收利用氮肥的效率指标。", descEn: "A measure of how efficiently a crop absorbs and utilizes applied nitrogen fertilizer.", category: "作物" },

      { chinese: "干旱", pinyin: "gān hàn", english: "Drought", descZh: "长期降水不足导致水资源短缺的现象。", descEn: "A prolonged period of abnormally low rainfall, leading to water shortage.", category: "灌溉" },
      { chinese: "滴灌", pinyin: "dī guàn", english: "Drip Irrigation", descZh: "通过管道将水缓慢滴送到植物根部的高效灌溉方法。", descEn: "Method where water drips slowly to plant roots through pipes/emitters.", category: "灌溉" },
      { chinese: "喷灌", pinyin: "pēn guàn", english: "Sprinkler Irrigation", descZh: "模拟降雨进行喷洒灌溉。", descEn: "Irrigation method that sprays water into the air like natural rainfall.", category: "灌溉" },

      { chinese: "可变速率技术", pinyin: "kě biàn sù lǜ jì shù", english: "Variable Rate Technology (VRT)", descZh: "根据农田差异调整种子、肥料等投入量的技术。", descEn: "Technology that adjusts input application rates based on field variability.", category: "机械" },
      { chinese: "旋耕机", pinyin: "xuán gēng jī", english: "Rotary Tiller / Rotavator", descZh: "利用旋转刀片破碎和混合土壤的耕作机械。", descEn: "A machine with rotating blades that break up and mix soil.", category: "机械" },
      { chinese: "GPS导航", pinyin: "GPS dǎo háng", english: "GPS Guidance System", descZh: "利用卫星定位实现拖拉机精准作业的导航系统。", descEn: "A satellite-based system for precise tractor navigation and field operations.", category: "机械" },

      // 畜牧 (11 terms)

      { chinese: "妊娠期", pinyin: "rèn shēn qī", english: "Gestation Period", descZh: "胎儿在母体内发育的时间。", descEn: "The period of fetal development inside the mother's womb.", category: "畜牧" },

      { chinese: "体况评分", pinyin: "tǐ kuàng píng fēn", english: "Body Condition Score (BCS)", descZh: "评估牲畜脂肪和肌肉储备的主观或客观方法。", descEn: "A method to assess the fat and muscle reserves of livestock.", category: "畜牧" },

      { chinese: "补贴", pinyin: "bǔ tiē", english: "Subsidy", descZh: "政府为稳定农业收入或鼓励生产而提供的财政支持。", descEn: "Government financial support to stabilize farm incomes or encourage production.", category: "经济" },

      { chinese: "农业合作社", pinyin: "nóng yè hé zuò shè", english: "Agricultural Cooperative", descZh: "农民自愿联合、共同经营和分享收益的组织。", descEn: "Organization owned and operated by farmers for mutual benefit.", category: "经济" },

      { chinese: "关税", pinyin: "guān shuì", english: "Tariff", descZh: "政府对进口农产品征收的税。", descEn: "A tax imposed on imported agricultural goods.", category: "经济" },
      { chinese: "农民市场", pinyin: "nóng mín shì chǎng", english: "Farmers' Market", descZh: "农民直接向消费者销售农产品的场所。", descEn: "A venue where farmers sell their products directly to consumers.", category: "经济" },

      { chinese: "农业经济学", pinyin: "nóng yè jīng jì xué", english: "Agricultural Economics", descZh: "将经济理论应用于农业生产和分配优化的学科。", descEn: "A branch of economics applying economic theory to optimize agricultural production and distribution.", category: "经济" },
      { chinese: "农产品营销", pinyin: "nóng chǎn pǐn yíng xiāo", english: "Agricultural Marketing", descZh: "农产品从农场到消费者的流通和销售全过程。", descEn: "The entire process of moving agricultural products from farm to consumer, including selling and promotion.", category: "经济" },

      { chinese: "杀虫剂", pinyin: "shā chóng jì", english: "Insecticide", descZh: "用于杀死或驱除害虫的化学物质。", descEn: "Any chemical substance used to kill, harm, or repel unwanted insects.", category: "植物保护" },
      { chinese: "除草剂", pinyin: "chú cǎo jì", english: "Herbicide", descZh: "用于杀死或抑制杂草生长的化学物质。", descEn: "A chemical substance used to kill or inhibit the growth of unwanted plants (weeds).", category: "植物保护" },
      { chinese: "杀菌剂", pinyin: "shā jūn jì", english: "Fungicide", descZh: "用于防治真菌病害的化学物质。", descEn: "A chemical substance used to prevent or kill fungal pathogens on crops.", category: "植物保护" },
      { chinese: "杀螨剂", pinyin: "shā mǎn jì", english: "Acaricide / Miticide", descZh: "专门用于杀死螨类（如红蜘蛛）的农药。", descEn: "A pesticide formulated specifically to kill, harm, repel, or mitigate one or more species of mites.", category: "植物保护" },

      { chinese: "再生农业", pinyin: "zài shēng nóng yè", english: "Regenerative Agriculture", descZh: "通过恢复土壤健康、增加生物多样性来改善生态系统的农业方式。", descEn: "A farming approach that focuses on restoring soil health and increasing biodiversity to improve ecosystems.", category: "可持续农业" },
      { chinese: "农业生态学", pinyin: "nóng yè shēng tài xué", english: "Agroecology", descZh: "将生态学原理应用于农业系统设计的学科。", descEn: "The application of ecological principles to the design and management of agricultural systems.", category: "可持续农业" },
      { chinese: "碳封存", pinyin: "tàn fēng cún", english: "Carbon Sequestration", descZh: "通过农业实践（如免耕、覆盖作物）将大气中的碳固定在土壤中。", descEn: "The process of capturing and storing atmospheric carbon in soil through agricultural practices.", category: "可持续农业" },
      { chinese: "有益管理实践", pinyin: "yǒu yì guǎn lǐ shí jiàn", english: "Beneficial Management Practices (BMPs)", descZh: "旨在优化农业生产同时保护土壤和水资源的可持续管理方法。", descEn: "Sustainable management methods that aim to optimize crop yield and quality while protecting soil and water.", category: "可持续农业" },
      { chinese: "保墒", pinyin: "bǎo shāng", english: "Soil Moisture Conservation", descZh: "通过覆盖、少耕等方法保持土壤水分的农业技术。", descEn: "Techniques to retain soil moisture through mulching, reduced tillage, etc.", category: "可持续农业" },
      { chinese: "农林复合经营", pinyin: "nóng lín fù hé jīng yíng", english: "Agroforestry", descZh: "将树木与农作物或牲畜在同一土地上结合经营的系统。", descEn: "A land-use system where trees are combined with crops and/or livestock on the same land.", category: "可持续农业" },

      { chinese: "水产养殖", pinyin: "shuǐ chǎn yǎng zhí", english: "Aquaculture", descZh: "在受控条件下养殖水生生物（鱼、虾、贝、藻等）。", descEn: "The farming of aquatic organisms under controlled conditions.", category: "水产养殖" },
      { chinese: "鱼菜共生", pinyin: "yú cài gòng shēng", english: "Aquaponics", descZh: "将水产养殖与水耕栽培结合的循环生态系统。", descEn: "A system combining aquaculture with hydroponics in a symbiotic environment.", category: "水产养殖" },
      { chinese: "水耕栽培", pinyin: "shuǐ gēng zāi péi", english: "Hydroponics", descZh: "不使用土壤，利用营养液在溶液中种植植物的方法。", descEn: "A method of growing plants without soil, using mineral nutrient solutions.", category: "水产养殖" },
      { chinese: "混养", pinyin: "hùn yǎng", english: "Polyculture", descZh: "在同一水体中同时养殖多个物种以提高生态效率。", descEn: "Raising multiple species together in the same water body to improve ecological efficiency.", category: "水产养殖" }
    ];

    // DOM elements
    const container = document.getElementById('termsContainer');
    const searchInput = document.getElementById('searchInput');
    const clearBtn = document.getElementById('clearSearchBtn');
    const categoryButtons = document.querySelectorAll('.category-btn');
    const categoryDescDiv = document.getElementById('categoryDescription');

    let activeCategory = 'all';
    let searchTerm = '';

    function updateCategoryDescription() {
      const desc = categoryDescriptions[activeCategory] || categoryDescriptions.all;
      categoryDescDiv.innerHTML = `<span class="desc-chinese">${desc.zh}</span> <span class="desc-english">${desc.en}</span>`;
    }

    function renderTerms() {
      const filtered = agriculturalTerms.filter(term => {
        if (activeCategory !== 'all' && term.category !== activeCategory) return false;
        if (searchTerm.trim() !== '') {
          const s = searchTerm.trim().toLowerCase();
          return (
            term.chinese.includes(searchTerm.trim()) ||
            term.pinyin.toLowerCase().includes(s) ||
            term.english.toLowerCase().includes(s) ||
            term.descZh.includes(searchTerm.trim()) ||
            term.descEn.toLowerCase().includes(s)
          );
        }
        return true;
      });

      if (filtered.length === 0) {
        container.innerHTML = `<div class="no-results">🌾 没有找到匹配的术语，试试其他关键词。No matching terms found.</div>`;
        return;
      }

      let html = '';
      filtered.forEach(term => {
        html += `
          <div class="term-card">
            <div class="term-header">
              <div class="chinese-block">
                <span class="chinese-term">${term.chinese}</span>
                <span class="pinyin-text">${term.pinyin}</span>
              </div>
              <span class="english-term">${term.english}</span>
              <span class="category-badge">${term.category}</span>
            </div>
            <div class="descriptions">
              <div class="desc-zh">📖 ${term.descZh}</div>
              <div class="desc-en">${term.descEn}</div>
            </div>
          </div>
        `;
      });
      container.innerHTML = html;
    }

    function updateCategoryButtons() {
      categoryButtons.forEach(btn => {
        const cat = btn.getAttribute('data-category');
        btn.classList.toggle('active', cat === activeCategory);
      });
    }

    categoryButtons.forEach(btn => {
      btn.addEventListener('click', function() {
        const category = this.getAttribute('data-category');
        if (activeCategory === category) return;
        activeCategory = category;
        updateCategoryButtons();
        updateCategoryDescription();
        renderTerms();
      });
    });

    searchInput.addEventListener('input', function(e) {
      searchTerm = e.target.value;
      renderTerms();
    });

    clearBtn.addEventListener('click', function() {
      searchInput.value = '';
      searchTerm = '';
      renderTerms();
      searchInput.focus();
    });

    // Initial render
    updateCategoryDescription();
    renderTerms();
  })();
</script>
</body>
</html>
